<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تسجيل الدخول</title>
  <style>
    body {
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0; /* لمنع الهوامش البيضاء في الجوال */
      overflow: hidden;
      position: relative;
    }

    .background {
      position: absolute;
      width: 100%;
      height: 100%;
      background: url("2.jpg") no-repeat center center fixed;
      background-size: cover; /* لضمان تغطية الصورة لكامل شاشة الجوال */
      filter: blur(9px) brightness(0.6);
      z-index: -1;
    }

    .container {
      position: relative;
      background-color: white;
      padding: 40px;
      border-radius: 21px;
      width: 400px;
      max-width: 90%; /* يمنع الصندوق من الخروج عن حواف الجوال */
      text-align: center;
      box-sizing: border-box; /* لضمان حساب المسافات بدقة */
    }

    h1 {
      color: black;
      font-size: 22px;
    }

    .input-group {
      text-align: right;
      margin-bottom: 15px;
      position: relative;
    }

    label {
      display: block;
      margin-bottom: 4px;
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 10px;
      padding-right: 15px; 
      border-radius: 8px;
      font-size: 16px; /* حجم 16 يمنع الزووم التلقائي المزعج في الجوال */
      box-sizing: border-box;
      border: 1px solid #ccc;
    }

    input:focus {
      border-color: black;
      outline: none;
    }

    .toggle-password {
      position: absolute;
      top: 35px;
      left: 10px;
      cursor: pointer;
      font-size: 14px;
      color: black;
      user-select: none;
    }

    button {
      width: 100%;
      padding: 12px;
      background: blue;
      color: white;
      border-radius: 9px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
      font-size: 14px;
      border: none;
    }

    .attempts,
    .error,
    .success {
      margin-top: 10px;
      font-weight: bold;
    }

    .error {
      color: red;
      display: none;
    }

    .success {
      color: green;
      display: none;
    }
  </style>
</head>

<body>
  <div class="background"></div>
  <div class="container">
    <h1>تسجيل الدخول الى الموقع</h1>
    <div class="input-group">
      <label for="username">اسم المستخدم</label>
      <input type="text" id="username" placeholder="أدخل اسم المستخدم" />
    </div>

    <div class="input-group">
      <label for="password">كلمة المرور</label>
      <input type="password" id="password" placeholder="أدخل كلمة المرور" />
      <span class="toggle-password" id="togglePassword">إظهار</span>
    </div>
    <button id="login-btn">دخول</button>

    <div class="attempts" id="attempts"></div>
    <div class="error" id="error-msg">
      خطأ في اسم المستخدم أو كلمة المرور!
    </div>
    <div class="success" id="success-msg">
      مرحبًا بك،
      <span id="user-name"></span>! سيتم تحويلك...
    </div>
  </div>

  <script>
    const CORRECT_USERNAME = "admin";
    const CORRECT_PASSWORD = "1234";
    const REDIRECT_URL = "ind.html"; 
    let attemptsLeft = 4;

    const usernameInput = document.getElementById("username");
    const passwordInput = document.getElementById("password");
    const loginBtn = document.getElementById("login-btn");
    const errorMsg = document.getElementById("error-msg");
    const successMsg = document.getElementById("success-msg");
    const userNameDisplay = document.getElementById("user-name");
    const attemptsDisplay = document.getElementById("attempts");
    const togglePassword = document.getElementById("togglePassword");

    function updateAttempts() {
      attemptsDisplay.textContent = `عدد المحاولات المتبقية: ${attemptsLeft}`;
    }

    updateAttempts();

    function handleLogin() {
      const enteredUsername = usernameInput.value.trim();
      const enteredPassword = passwordInput.value.trim();

      if (enteredUsername === "" || enteredPassword === "") {
        errorMsg.textContent = "يرجى إدخال اسم المستخدم وكلمة المرور.";
        errorMsg.style.display = "block";
        return;
      }
      errorMsg.style.display = "none";
      successMsg.style.display = "none";

      setTimeout(() => {
        if (enteredUsername === CORRECT_USERNAME && enteredPassword === CORRECT_PASSWORD) {
          userNameDisplay.textContent = enteredUsername;
          successMsg.style.display = "block";
          setTimeout(() => {
            window.location.href = REDIRECT_URL;
          }, 2000);
        } else {
          attemptsLeft--;
          updateAttempts();
          errorMsg.style.display = "block";
          if (attemptsLeft === 0) {
            usernameInput.disabled = true;
            passwordInput.disabled = true;
            loginBtn.disabled = true;
            errorMsg.textContent = "تم استنفاد جميع المحاولات. حاول لاحقًا.";
          }
        }
      }, 1000);
    }

    loginBtn.addEventListener("click", handleLogin);
    passwordInput.addEventListener("keypress", (e) => {
      if (e.key === "Enter") handleLogin();
    });
    togglePassword.addEventListener("click", () => {
      const type = passwordInput.getAttribute("type") === "password" ? "text" : "password";
      passwordInput.setAttribute("type", type);
      togglePassword.textContent = type === "password" ? "إظهار" : "إخفاء";
    });
  </script>
</body>
</html>
