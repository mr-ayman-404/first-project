<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta charset="UTF-8" />
  <title>اتصل بنا - دليل الطالب الجامعي</title>
  <style>
    .contact-form {
      max-width: 500px;
      margin: 30px auto;
      padding: 20px;
      background-color: #15014a;
      border-radius: 10px;
      font-weight: bold;
    }

    .contact-form h3 {
      text-align: center;
      color: white;
      /* لون العنوان */
    }

    .contact-form label {
      display: block;
      margin: 10px 0 5px;
      color: white;
      /* لون النصوص */
    }

    .contact-form input,
    .contact-form textarea {
      width: 100%;
      padding: 8px;
      border-radius: 5px;
      border: 1px solid #ccc;
      box-sizing: border-box;
      background-color: #ffffff;
      /* خلفية الحقول لتتناسب مع النص الأبيض */
      color: rgb(12, 1, 1);
      /* لون النص داخل الحقول */
      font-size: larger;
    }

    .contact-form button {
      margin-top: 15px;
      width: 50%;
      padding: 10px;
      background-color: #0052aa97;
      color: white;
      /* لون نص الزر */
      border-radius: 50px;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <div id="header-container"></div>

  <!-- نموذج التواصل عبر الإيميل -->
  <section class="contact-form">
    <h3>تواصل معنا عبر الإيميل</h3>
    <label for="name">الاسم:</label>
    <input type="text" id="name" name="name" placeholder="ادخل اسمك" required />

    <label for="email">الإيميل:</label>
    <input type="email" id="email" name="email" placeholder="ادخل بريدك الإلكتروني" required />

    <label for="message">الرسالة:</label>
    <textarea id="message" name="message" rows="5" placeholder="اكتب رسالتك هنا" required></textarea>

    <button type="submit">إرسال</button>
  </section>
  <script src="j.js"></script>
</body>

</html>
